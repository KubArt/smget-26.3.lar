<div class="sp-alert-bar">
    <div class="sp-alert-container">
        <div class="sp-alert-text">{text}</div>
        <div class="sp-alert-actions">
            <a href="{link}" class="sp-alert-btn {display_button}" id="sp-action-btn">{btn_text}</a>
            <button class="sp-alert-close" id="sp-close">✕</button>
        </div>
    </div>
</div>
