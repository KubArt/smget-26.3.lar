<div class="sp-modal-center">
    <div class="sp-modal-minimal-card">
        <div class="sp-modal-minimal-header">
            <h3 class="sp-modal-minimal-title">Конфиденциальность</h3>
        </div>
        <div class="sp-modal-minimal-body">
            <p class="sp-modal-minimal-text">{text}</p>
            <a href="{policy_url}" class="sp-modal-minimal-link" target="_blank">{policy_text}</a>
        </div>
        <div class="sp-modal-minimal-footer">
            <button class="sp-modal-minimal-btn-leave" id="sp-leave">{btn_leave_text}</button>
            <button class="sp-modal-minimal-btn-accept">{btn_accept_text}</button>
        </div>
    </div>
</div>
