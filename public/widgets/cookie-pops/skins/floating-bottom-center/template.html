<div class="sp-bubble-wrapper">
    <div class="sp-bubble-body">
        <div class="sp-bubble-icon">🍪</div>
        <div class="sp-bubble-text-group">
            <span class="sp-bubble-text">{text}</span>
            <a href="{policy_url}" class="sp-bubble-link" target="_blank">{policy_text}</a>
        </div>
    </div>
    <div class="sp-bubble-actions">
        <button class="sp-bubble-btn-accept">{btn_accept_text}</button>
        <button class="sp-bubble-btn-leave" id="sp-leave">{btn_leave_text}</button>
    </div>
</div>
