<div class="sp-skin-side-bar-slim">
    <div class="sp-slim-wrapper">
        <div class="sp-slim-content">
            <div class="sp-slim-header">
                <div class="sp-slim-icon">🍪</div>
                <div class="sp-slim-title">Cookie Settings</div>
            </div>
            <p class="sp-slim-text">{text}</p>
            <a href="{policy_url}" class="sp-slim-policy" target="_blank">{policy_text}</a>
        </div>

        <div class="sp-slim-actions">
            <button class="sp-slim-btn-leave" id="sp-leave">{btn_leave_text}</button>
            <button class="sp-slim-btn-accept">{btn_accept_text}</button>
        </div>
    </div>
</div>
