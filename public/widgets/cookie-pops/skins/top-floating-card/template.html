<div class="sp-skin-top-floating-card">
    <div class="sp-top-floating-card">
        <div class="sp-floating-body">
            <div class="sp-floating-icon">🍪</div>
            <div class="sp-floating-content">
                <div class="sp-floating-text">{text}</div>
                <a href="{policy_url}" class="sp-floating-policy" target="_blank">{policy_text}</a>
            </div>
        </div>
        <div class="sp-floating-actions">
            <button class="sp-floating-btn-leave" id="sp-leave">{btn_leave_text}</button>
            <button class="sp-floating-btn-accept">{btn_accept_text}</button>
        </div>
    </div>
</div>
