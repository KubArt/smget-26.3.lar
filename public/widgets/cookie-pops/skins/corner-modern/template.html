<div class="sp-skin-corner-modern">
    <div class="sp-corner-modern">
        <div class="sp-modern-body">
            <div class="sp-modern-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/>
                    <path d="M12 8V12" stroke-linecap="round"/>
                    <circle cx="12" cy="16" r="0.5" fill="currentColor"/>
                </svg>
            </div>
            <div class="sp-modern-content">
                <div class="sp-modern-text">{text}</div>
                <a href="{policy_url}" class="sp-modern-policy" target="_blank">{policy_text}</a>
            </div>
        </div>
        <div class="sp-modern-actions">
            <button class="sp-modern-btn-leave" id="sp-leave">{btn_leave_text}</button>
            <button class="sp-modern-btn-accept">{btn_accept_text}</button>
        </div>
    </div>
</div>
