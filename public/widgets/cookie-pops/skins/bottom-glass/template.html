<div class="sp-glass-container">
    <div class="sp-glass-content">
        <div class="sp-glass-text">
            {text}
            <a href="{policy_url}" class="sp-glass-link" target="_blank">{policy_text}</a>
        </div>
    </div>
    <div class="sp-glass-actions">
        <button class="sp-glass-btn-leave" id="sp-leave">{btn_leave_text}</button>
        <button class="sp-glass-btn">{btn_accept_text}</button>
    </div>
</div>
