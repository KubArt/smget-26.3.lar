<div class="sp-skin-side-panel-left">
    <div class="sp-side-wrapper">
        <div class="sp-side-content">
            <div class="sp-side-header">
                <div class="sp-slim-icon">🍪</div>
                <div class="sp-slim-title">Cookie Settings</div>
            </div>
            <p class="sp-side-text">{text}</p>
            <a href="{policy_url}" class="sp-side-policy" target="_blank">{policy_text}</a>
        </div>

        <div class="sp-side-actions">
            <button class="sp-side-btn-leave" id="sp-leave">{btn_leave_text}</button>
            <button class="sp-side-btn-accept">{btn_accept_text}</button>
        </div>
    </div>
</div>
