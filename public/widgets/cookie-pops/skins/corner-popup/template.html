<div class="sp-skin-corner-popup">
    <div class="sp-corner-popup">
        <div class="sp-popup-icon">
            🍪
        </div>
        <div class="sp-popup-content">
            <div class="sp-popup-text">{text}</div>
            <a href="{policy_url}" class="sp-popup-link" target="_blank">{policy_text}</a>
        </div>
        <div class="sp-popup-footer">
            <button class="sp-popup-btn-leave" id="sp-leave">{btn_leave_text}</button>
            <button class="sp-popup-btn-accept">{btn_accept_text}</button>
        </div>
    </div>
</div>
