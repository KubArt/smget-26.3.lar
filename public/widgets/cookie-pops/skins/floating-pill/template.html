<div class="sp-floating-pill">
    <div class="sp-pill-body">
        <div class="sp-pill-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <circle cx="8" cy="8" r="1.5" fill="currentColor"></circle>
                <circle cx="15" cy="10" r="1.5" fill="currentColor"></circle>
                <circle cx="12" cy="17" r="1.5" fill="currentColor"></circle>
                <circle cx="7" cy="14" r="1" fill="currentColor"></circle>
            </svg>
        </div>
        <div class="sp-pill-content">
            <span class="sp-pill-text">{text}</span>
            <a href="{policy_url}" class="sp-pill-link" target="_blank">{policy_text}</a>
        </div>
    </div>
    <div class="sp-pill-actions">
        <button class="sp-pill-btn-leave" id="sp-leave">{btn_leave_text}</button>
        <button class="sp-pill-btn-accept">{btn_accept_text}</button>
    </div>
</div>
