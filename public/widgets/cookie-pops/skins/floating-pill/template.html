<div class="sp-skin-floating-pill">
    <div class="sp-floating-pill">
        <div class="sp-pill-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                <path d="M12 6v6l4 2" stroke-linecap="round"/>
                <circle cx="7" cy="9" r="1" fill="currentColor" stroke="none"/>
                <circle cx="16" cy="8" r="1" fill="currentColor" stroke="none"/>
            </svg>
        </div>
        <div class="sp-pill-content">
            <span class="sp-pill-text">{text}</span>
            <a href="{policy_url}" class="sp-pill-link" target="_blank">{policy_text}</a>
        </div>
        <div class="sp-pill-actions">
            <button class="sp-pill-btn-leave" id="sp-leave">{btn_leave_text}</button>
            <button class="sp-pill-btn-accept">{btn_accept_text}</button>
        </div>
    </div>
</div>
