<div class="sp-skin-top-bar">
    <div class="sp-top-bar-wrapper">
        <div class="sp-top-bar-container">
            <div class="sp-top-bar-content">
                <span class="sp-top-bar-cookie">🍪</span>
                <div class="sp-top-bar-text-group">
                    <span class="sp-top-bar-text">{text}</span>
                    <a href="{policy_url}" class="sp-top-bar-policy" target="_blank">{policy_text}</a>
                </div>
            </div>
            <div class="sp-top-bar-actions">
                <button class="sp-top-bar-btn-leave" id="sp-leave">{btn_leave_text}</button>
                <button class="sp-top-bar-btn-accept">{btn_accept_text}</button>
            </div>
        </div>
    </div>
</div>
