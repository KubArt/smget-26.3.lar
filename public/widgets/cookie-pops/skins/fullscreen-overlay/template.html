<div class="sp-overlay-bg">
    <div class="sp-overlay-card">
        <div class="sp-overlay-icon">
            <div class="sp-icon-circle">
                🍪
            </div>
        </div>
        <p class="sp-overlay-text">{text}</p>

        <div class="sp-overlay-actions">
            <button class="sp-overlay-btn-accept">{btn_accept_text}</button>
            <button class="sp-overlay-btn-leave" id="sp-leave">{btn_leave_text}</button>
        </div>

        <a href="{policy_url}" class="sp-overlay-policy" target="_blank">{policy_text}</a>
    </div>
</div>
