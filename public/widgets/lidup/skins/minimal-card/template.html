<div class="sp-lidup-overlay sp-{animation_in}" data-sp-overlay>
    <div class="sp-lidup-popup sp-position-{position}">
        <button class="sp-lidup-close" data-sp-close>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>

        <div class="sp-lidup-content sp-image-{image_position}">
            {image_html}

            <div class="sp-lidup-inner">
                <!-- Блок: форма -->
                <div class="sp-lidup-state sp-lidup-state-form">
                    <h3 class="sp-lidup-title">{title}</h3>
                    <p class="sp-lidup-description">{description}</p>

                    <form class="sp-lidup-form" data-sp-form>
                        <div id="sp-form-fields"></div>
                        <button type="submit" class="sp-lidup-submit">{btn_text}</button>
                        <div class="sp-lidup-message" style="display: none;"></div>
                    </form>
                </div>

                <!-- Блок: успех (без приза) -->
                <div class="sp-lidup-state sp-lidup-state-success" style="display: none;">
                    <div class="sp-lidup-success-message">
                        <div class="success-icon">✓</div>
                        <p class="success-text"></p>
                    </div>
                </div>

                <!-- Блок: бонус (с призом) -->
                <div class="sp-lidup-state sp-lidup-state-bonus" style="display: none;">
                    <div class="sp-lidup-bonus-card">
                        <p class="bonus-message"></p>
                        <h4 class="bonus-title"></h4>
                        <div class="bonus-code">
                            <span class="code-label">Ваш промокод:</span>
                            <strong class="code-value"></strong>
                        </div>
                        <p class="bonus-description"></p>
                        <p class="bonus-expires"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
