<div class="sfw-root sp-position-{position}" id="sfw-{id}">
    <div class="sfw-overlay">
        <div class="sfw-modal-content">
            <button class="sfw-close-btn" data-sp-close>×</button>
            <div class="sfw-grid">
                <div class="sfw-left">
                    <div class="sfw-wheel-container">
                        <div class="sfw-pointer"></div>
                        <canvas id="sfw-canvas-{id}" width="300" height="300"></canvas>
                    </div>
                </div>
                <div class="sfw-right">
                    <div class="sfw-form-body">
                        <h3>{title}</h3>
                        <p>{description}</p>
                        <div class="sfw-actions">
                            <button class="sfw-spin-trigger">Испытать удачу</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sfw-trigger" data-sp-toggle>
        <span class="sfw-icon">🎡</span>
    </div>
</div>
