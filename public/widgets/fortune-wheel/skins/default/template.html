<div class="sfw-root sp-position-{position}" id="sfw-{id}" data-widget-id="{widget_id}">

    <div class="sfw-overlay" id="sfw-modal-{id}">
        <div class="sfw-modal-backdrop" data-sp-close></div>
        <div class="sfw-modal-content">
        <button class="sfw-close-btn" data-sp-close>×</button>
        <div class="sfw-grid">
            <div class="sfw-left">
                <div class="sfw-wheel-container">
                    <div class="sfw-pointer"></div>
                    <canvas id="sfw-canvas-{id}" width="{wheel_size}" height="{wheel_size}"></canvas>
                </div>
            </div>
            <div class="sfw-right">
                <div class="sfw-form-body">
                    <h3>{title}</h3>
                    <p>{description}</p>
                    <div id="sfw-form-fields-{id}">
                        <button class="sfw-spin-trigger">Играть</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <div class="sfw-trigger" data-sp-toggle>
        <span class="sfw-icon">🎡</span>
    </div>
</div>
