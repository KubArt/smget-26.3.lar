<div class="sfw-wheel-widget sp-position-{position}" id="sfw-{id}">
    <div class="sfw-overlay" id="sfw-modal-{id}">
        <div class="sfw-modal-content">
            <button class="sfw-close" data-sp-close>✕</button>
            <div class="sfw-main-grid">
                <div class="sfw-wheel-side">
                    <div class="sfw-pointer"></div>
                    <canvas id="sfw-canvas-{id}"></canvas>
                </div>
                <div class="sfw-form-side">
                    <h3>{title}</h3>
                    <p>{description}</p>
                    <div id="sfw-form-fields-{id}"></div>
                    <button class="sfw-spin-trigger">{btn_spin_text}</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sp-main-button" data-sp-toggle>
        <div class="sp-icon-open">🎡</div>
        <div class="sp-icon-close">✕</div>
    </div>
</div>
